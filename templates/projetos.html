<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    
    <title>Detalhes do Projeto</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/projetos.css">
</head>

<body>
    
    <div class="lang-selector">
        <div class="flag-btn active-lang" id="flag-pt" onclick="changeLanguage('pt')" title="Português"></div>
        <span class="lang-separator">|</span>
        <div class="flag-btn" id="flag-en" onclick="changeLanguage('en')" title="English"></div>
    </div>

    <div style="width: 90%; max-width: 900px; margin: 30px auto 20px auto; position: relative; z-index: 10;">
        <a href="../index.html" class="btn-back-link" data-i18n="btn_back_home">← Voltar para Home</a>
    </div>

    <div class="glass-card project-card-wide" id="project-container">
        
        <h1 class="project-title" id="p-title">Carregando...</h1>
        <h2 class="project-subtitle" id="p-subtitle">...</h2>
        
        <div class="content-flow clearfix">
            
            <div class="project-img-float">
                <img src="" alt="Imagem do Projeto" class="project-image" id="p-img">
                
                <video id="p-video" class="project-image" controls muted playsinline style="display: none;">
                    Seu navegador não suporta vídeos.
                </video>
            </div>

            <div class="project-description-flow" id="p-desc">
                </div>

        </div>

        <div class="project-separator"></div>

        <div class="project-card-footer">
            <span class="footer-info-item"><span data-i18n="lbl_tech">Tecnologias:</span> <span id="p-tech" class="highlight-green">Carregando...</span></span>
            <span class="footer-info-item"><span data-i18n="lbl_year">Ano:</span> <span id="p-year" class="highlight-green">...</span></span>
        </div>

        <div id="animation-section" style="display: none;">
            
            <div class="project-separator"></div>

            <h3 class="animation-title" data-i18n="lbl_motion">Motion & Design</h3>
            
            <div class="animation-wrapper">
                <video id="p-animation-video" class="project-image" controls loop muted playsinline>
                    Seu navegador não suporta vídeos.
                </video>
            </div>
        </div>
        
    </div>

    <footer class="avatar-footer">
        <div class="footer-content">
            <div class="footer-left">
                <p><strong data-i18n="footer_dev">Desenvolvido por Bruno Zamboni</strong></p>
                <p data-i18n="footer_motto">Desenvolvemos muito além do software</p>
                <p class="copyright" data-i18n="footer_rights">Todos os direitos reservados a Dalzam 2026</p>
            </div>

            <div class="footer-links-center">
                <a href="https://github.com/zambonib" target="_blank" class="social-link">
                    <i class="fab fa-github"></i> GitHub
                </a>
                <a href="https://linkedin.com/in/brunozamboni" target="_blank" class="social-link">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://instagram.com/zambonib" target="_blank" class="social-link">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>

            <div class="avatar-wrapper">
                <div class="flashlight-beam"></div>
                <img src="../static/assets/Avatar.png" class="avatar-img img-off" alt="Avatar Bruno">
                <img src="../static/assets/Avatar2.png" class="avatar-img img-on" alt="Avatar com Lanterna">
            </div>
        </div>
    </footer>

    <script src="../static/js/projetos.js"></script>
</body>
</html>
